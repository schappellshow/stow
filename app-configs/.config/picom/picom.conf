# Picom compositor — Awesome WM / OpenMandriva

# ── Backend ────────────────────────────────────────────────────────────────
# glx is required for dual_kawase blur. Fall back to "xrender" + remove
# blur section if you see a black screen or driver errors.
backend = "glx";
vsync = true;
glx-no-stencil = true;
glx-copy-from-front = false;

# ── Rounded corners ────────────────────────────────────────────────────────
# Must match theme.lua border_radius = dpi(10).
# At HiDPI (192 DPI) dpi(10) = 20 — update this value to match.
corner-radius = 10;

rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Rofi'",
    "_NET_WM_STATE@:32a *= '_NET_WM_STATE_FULLSCREEN'",
];

# ── Shadows ────────────────────────────────────────────────────────────────
shadow = true;
shadow-radius = 18;
shadow-offset-x = -12;
shadow-offset-y = -10;
shadow-opacity = 0.6;
shadow-color = "#000000";

shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g = 'Rofi'",
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c",
    "_NET_WM_STATE@:32a *= '_NET_WM_STATE_FULLSCREEN'",
];

# ── Fading (open/close animation) ─────────────────────────────────────────
fading = true;
fade-in-step  = 0.06;
fade-out-step = 0.06;
fade-delta    = 5;

fade-exclude = [
    "window_type = 'dock'",
];

# ── Opacity ────────────────────────────────────────────────────────────────
inactive-opacity = 0.92;
active-opacity   = 1.0;
frame-opacity    = 1.0;
inactive-opacity-override = false;
inactive-dim = 0.0;

opacity-rule = [
    "100:class_g = 'Rofi'",
    "100:window_type = 'dock'",
    "100:_NET_WM_STATE@:32a *= '_NET_WM_STATE_FULLSCREEN'",
];

# ── Blur ───────────────────────────────────────────────────────────────────
blur-method = "dual_kawase";
blur-strength = 5;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = false;

blur-background-exclude = [
    "window_type = 'desktop'",
    # The quickshell bar is a transparent dock; blurring it painted a
    # frosted strip with a visible edge. Unblurred, only the opaque pills
    # show — free-floating widget look.
    "window_type = 'dock'",
    "class_g = 'slop'",
    "_GTK_FRAME_EXTENTS@:c",
];

# ── Window type overrides ──────────────────────────────────────────────────
wintypes:
{
    tooltip       = { fade = true;  shadow = false; opacity = 0.9; focus = true; };
    dock          = { shadow = false; clip-shadow-above = true; };
    dnd           = { shadow = false; };
    popup_menu    = { opacity = 0.95; shadow = true; };
    dropdown_menu = { opacity = 0.95; shadow = true; };
    notification  = { shadow = false; };
};
