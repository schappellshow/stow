# Portal backend routing for the awesome session (XDG_CURRENT_DESKTOP is
# unset there, so the unprefixed portals.conf applies).
#
# Settings (dark/light color-scheme queries from Electron apps like Slack)
# goes to the GTK backend, which reads GSettings — quickshell's SystemTheme
# service writes those. Everything else (file dialogs etc.) stays with KDE.
[preferred]
default=kde
org.freedesktop.impl.portal.Settings=gtk;kde
