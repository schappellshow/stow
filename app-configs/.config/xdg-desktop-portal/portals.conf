# Portal backend routing for the awesome session (XDG_CURRENT_DESKTOP is
# unset there, so the unprefixed portals.conf applies).
#
# Everything goes to the GTK backend: it reads the GSettings/gtk theming
# that quickshell's SystemTheme service writes, so file dialogs (browser
# downloads etc.) and color-scheme queries (Electron apps like Slack) all
# follow the shell's dark/light mode. The KDE backend is out of the loop
# entirely (KDE-independence).
[preferred]
default=gtk
